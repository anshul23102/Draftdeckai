services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - DRAFTDECK_RUNTIME_ENV=production
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:-your-super-secret-jwt-key}
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/draftdeck
    depends_on:
      db:
        condition: service_healthy
    networks:
      - draftdeck-network

  db:
    image: postgres:16
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=draftdeck
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d draftdeck"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - draftdeck-network

networks:
  draftdeck-network:
    driver: bridge

volumes:
  postgres_data:
