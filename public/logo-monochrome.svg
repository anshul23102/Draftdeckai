<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 44" fill="none">
  <!-- Brand elements in single color (monochrome) -->
  <g fill="currentColor" stroke="currentColor" stroke-width="0">
    <!-- Logo Icon -->
    <g transform="translate(4, 6)">
      <!-- Back card -->
      <path d="M 8 12 L 24 12 C 32 12 37 17 37 24 C 37 31 32 36 24 36 L 8 36 Z" 
            opacity="0.3" transform="rotate(-6 22 24)"/>
      
      <!-- Middle card -->
      <path d="M 10 10 L 26 10 C 34 10 39 15 39 22 C 39 29 34 34 26 34 L 10 34 Z" 
            opacity="0.6" transform="rotate(-3 24 22)"/>

      <!-- Front card -->
      <path d="M 12 8 L 28 8 C 36 8 41 13 41 20 C 41 27 36 32 28 32 L 12 32 Z" />
            
      <!-- Inner cutout -->
      <path d="M 18 14 L 25 14 C 29 14 32 16 32 20 C 32 24 29 26 25 26 L 18 26 Z" 
            fill="none" stroke="currentColor" stroke-width="2" />
            
      <!-- Drafting lines -->
      <line x1="21" y1="18" x2="29" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
      <line x1="21" y1="22" x2="27" y2="22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />

      <!-- Sparkle -->
      <g transform="translate(36, 6)">
        <path d="M 0,-6 L 1.5,-1.5 L 6,0 L 1.5,1.5 L 0,6 L -1.5,1.5 L -6,0 L -1.5,-1.5 Z" fill="currentColor"/>
      </g>
    </g>

    <!-- Typography -->
    <text x="54" y="28" font-size="19" font-weight="700" letter-spacing="-0.5" font-family="system-ui, -apple-system, sans-serif">DraftDeck</text>
    <text x="151" y="28" font-size="19" font-weight="800" font-family="system-ui, -apple-system, sans-serif">AI</text>
  </g>
</svg>
